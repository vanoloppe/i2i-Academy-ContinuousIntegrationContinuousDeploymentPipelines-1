name: CI-CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step A: Set up Python and install dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step B: Execute Unit Test
      - name: Run Unit Tests
        run: pytest test_app.py

      # Step C: Execute Selenium UI Test
      - name: Run Selenium UI Tests
        run: pytest test_ui.py

      # Step D: Print final deployment confirmation message
      - name: Simulate Production Deployment
        if: success()
        run: echo "All tests passed! Application successfully deployed to production."
